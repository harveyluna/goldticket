    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {

    }

    /* ── Shared ── */
    .gold      { color: #D4A843; }
    .gold-dim  { color: #9a7a30; }
    .muted     { color: #888; }
    .small     { font-size: 0.78rem; }

    /* ── Badge ── */
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid #D4A843;
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #D4A843;
    }
    .badge svg { width: 13px; height: 13px; }

    /* ── Home ── */
    .home {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 20px 80px;
      text-align: center;
    }
    .home h1 {
      font-size: clamp(2.8rem, 8vw, 5.2rem);
      font-weight: 800;
      line-height: 1.0;
      color: #f0e8d5;
      margin: 24px 0 16px;
      letter-spacing: -0.02em;
    }
    .home .subtitle {
      font-size: 1.05rem;
      color: #999;
      max-width: 480px;
      margin: 0 auto 48px;
      line-height: 1.6;
    }

    /* ── Progress ring ── */
    .progress-card {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 36px 32px;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      min-width: 220px;
      margin-bottom: 52px;
    }
    .ring-wrap { position: relative; width: 100px; height: 100px; }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .ring-center .big { font-size: 2rem; font-weight: 700; color: #f0e8d5; }
    .ring-center .of  { font-size: 0.72rem; color: #666; }
    .progress-card .remain { color: #888; font-size: 0.9rem; }

    /* ── Grid ── */
    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
      text-align: left;
    }

    /* ── Category card ── */
    .cat-card {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 18px 20px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .cat-card:hover { border-color: #444; background: #222; }
    .cat-card.picked { border-color: #3a3020; background: #1e1c14; }

    .cat-icon {
      width: 100px; height: 100px; min-width: 100px; min-height: 100px;
      border-radius: 14px; background: #252525; overflow: hidden; flex-shrink: 0;
      position: relative; border: 1px solid #2f2f2f;
      display: flex; align-items: center; justify-content: center;
    }
    .cat-icon svg { width: 28px; height: 28px; position: relative; z-index: 0; }
    .cat-icon img {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover; display: block;
      z-index: 1;
    }

    .cat-body { flex: 1; min-width: 0; }
    .cat-title { font-size: 0.95rem; font-weight: 600; color: #e5e5e5; }
    .cat-sub   { font-size: 0.78rem; color: #666; margin-top: 2px; }
    .cat-pick  { font-size: 0.82rem; color: #D4A843; margin-top: 6px; font-weight: 600; }
    .cat-pick-detail { font-size: 0.76rem; color: #888; }

    .cat-right {
      display: flex; align-items: center;
      flex-shrink: 0;
    }
    .check-circle {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #D4A843;
      display: flex; align-items: center; justify-content: center;
    }
    .check-circle svg { width: 13px; height: 13px; }
    .arrow-circle {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #252525;
      display: flex; align-items: center; justify-content: center;
    }
    .arrow-circle svg { width: 14px; height: 14px; color: #666; }

      padding: 0;

    .back-btn svg { width: 16px; height: 16px; }

      display: flex; align-items: center; gap: 18px;
      margin-bottom: 32px;
    }

      width: 60px; height: 60px;
      border-radius: 14px;
      background: #2e2812;
      display: flex; align-items: center; justify-content: center;

    .detail-header h2 { font-size: 1.6rem; font-weight: 700; color: #f0e8d5; }
    .detail-header p  { font-size: 0.9rem; color: #888; margin-top: 4px; }

      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 14px 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.15s, background 0.15s;
    }
    .nominee-row:hover { border-color: #444; background: #222; }
    .nominee-row.selected {
      border-color: #D4A843;
      background: #1e1c14;
    }

    .nominee-avatar {
      width: 100px; height: 100px;
      border-radius: 8px;
      background: #2a2a2a;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      font-weight: 600;
      color: #888;
      flex-shrink: 0;
      overflow: hidden;
    }
    .nominee-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
    .nominee-avatar img.poster {
      object-position: center center;
    }
    .nominee-row.selected .nominee-avatar { background: #3a3020; color: #D4A843; }
    .nominee-row.selected .nominee-avatar img { outline: 2px solid #D4A843; border-radius: 8px; }

    .nominee-info { flex: 1; min-width: 0; }
    .nominee-name   { font-size: 0.95rem; font-weight: 500; color: #e5e5e5; }
    .nominee-detail { font-size: 0.8rem; color: #666; margin-top: 2px; }
    .nominee-row.selected .nominee-name { color: #f0e8d5; }

    .radio {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid #333;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s;
    }
    .nominee-row:hover .radio { border-color: #666; }
    .nominee-row.selected .radio {
      border-color: #D4A843;
      background: #D4A843;
    }
    .radio-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #111;

      font-weight: 700;

/* ─────────────────────────────────────────────
   ICONS
───────────────────────────────────────────── */
const TrophyIcon = ({ color = '#D4A843' }) => (
  <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    <path d="M6 2h12v7a6 6 0 01-12 0V2z"/>
    <path d="M6 4H3a2 2 0 000 4h3"/>
    <path d="M18 4h3a2 2 0 010 4h-3"/>
    <path d="M12 15v4"/>
    <path d="M8 19h8"/>
  </svg>
);

const ArrowRight = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M9 18l6-6-6-6"/>
  </svg>
);

const ArrowLeft = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M15 18l-6-6 6-6"/>
  </svg>
);

const CheckIcon = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="#111" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
);

/* ─────────────────────────────────────────────
   PROGRESS RING
───────────────────────────────────────────── */
function ProgressRing({ value, total }) {
  const r = 40;
  const circ = 2 * Math.PI * r;
  const pct = total === 0 ? 0 : value / total;
  const dash = pct * circ;

  return (
    <div className="ring-wrap">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r={r} stroke="#2a2a2a" strokeWidth="7" fill="none"/>
        <circle
          cx="50" cy="50" r={r}
          stroke="#D4A843" strokeWidth="7" fill="none"
          strokeDasharray={`${dash} ${circ}`}
          strokeLinecap="round"
          style={{ transition: 'stroke-dasharray 0.4s ease' }}
        />
      </svg>
      <div className="ring-center">
        <span className="big">{value}</span>
        <span className="of">of {total}</span>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   HOME PAGE
───────────────────────────────────────────── */
function HomePage({ picks, onSelect }) {
  const total = CATEGORIES.length;
  const done  = Object.keys(picks).length;
  const remaining = total - done;

  return (
    <div className="home">
      <div className="badge">
        <TrophyIcon color="#D4A843"/>
        98TH ACADEMY AWARDS
      </div>

      <h1>Oscar<br/>Predictions</h1>
      <p className="subtitle">
        Make your picks across {total} categories and see how<br/>
        you stack up on Hollywood's biggest night.
      </p>

      <div className="progress-card">
        <ProgressRing value={done} total={total}/>
        <span className="remain muted">
          {remaining === 0 ? '🎉 All picks made!' : `${remaining} ${remaining === 1 ? 'category' : 'categories'} remaining`}
        </span>
      </div>

      <div className="categories-grid">
        {CATEGORIES.map(cat => {
          const pick = picks[cat.id];
          const thumbSrc = pick?.photo || cat.nominees[0]?.photo || '';
          return (
            <div
              key={cat.id}
              className={`cat-card${pick ? ' picked' : ''}`}
              onClick={() => onSelect(cat.id)}
            >
              <div className="cat-icon">
                <TrophyIcon color={pick ? '#D4A843' : '#555'}/>
                {thumbSrc && (
                  <img
                    src={thumbSrc}
                    alt={cat.name}
                    onError={e => { e.target.style.display = 'none'; }}
                  />
                )}
              </div>
              <div className="cat-body">
                <div className="cat-title">{cat.name}</div>
                <div className="cat-sub">{cat.nominees.length} nominees</div>
                {pick && (
                  <>
                    <div className="cat-pick small" style={{marginTop:8,fontSize:'0.72rem',color:'#888',fontWeight:400}}>Your pick</div>
                    <div className="cat-pick">{pick.name}</div>
                    {pick.detail && <div className="cat-pick-detail">{pick.detail}</div>}
                  </>
                )}
              </div>
              <div className="cat-right">
                {pick ? (
                  <div className="check-circle"><CheckIcon/></div>
                ) : (
                  <div className="arrow-circle"><ArrowRight/></div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   CATEGORY PAGE
───────────────────────────────────────────── */
function CategoryPage({ categoryId, picks, onPick, onBack }) {
  const cat   = CATEGORIES.find(c => c.id === categoryId);
  const current = picks[categoryId];

  const initials = (name) => {
    const parts = name.replace(/['"]/g, '').split(' ');
    return parts.length >= 2
      ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase()
      : name.replace(/['"]/g, '').slice(0, 2).toUpperCase();
  };

  return (
    <div className="detail-page">
      <button className="back-btn" onClick={onBack}>
        <ArrowLeft/> Back to categories
      </button>

      <div className="detail-header">
        <div className="detail-icon">
          <TrophyIcon color="#D4A843"/>
        </div>
        <div>
          <h2>{cat.name}</h2>
          <p>Select your prediction for the winner</p>
        </div>
      </div>

      <div className="nominee-list">
        {cat.nominees.map(n => {
          const sel = current && current.name === n.name;
          return (
            <div
              key={n.name}
              className={`nominee-row${sel ? ' selected' : ''}`}
              onClick={() => onPick(categoryId, n)}
            >
              <div className="nominee-avatar">
                {n.photo
                  ? <img
                      src={n.photo}
                      alt={n.name}
                      className={n.photoType === 'poster' ? 'poster' : ''}
                      onError={e => { e.target.style.display='none'; e.target.parentNode.textContent = initials(n.name); }}
                    />
                  : initials(n.name)
                }
              </div>
              <div className="nominee-info">
                <div className="nominee-name">{n.name}</div>
                {n.detail && <div className="nominee-detail">{n.detail}</div>}
              </div>
              <div className="radio">
                {sel && <div className="radio-dot"/>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   APP ROOT
───────────────────────────────────────────── */
function App() {
  const [picks, setPicks] = useState(() => {
    try {
      const saved = localStorage.getItem('goldticket_picks');
      return saved ? JSON.parse(saved) : {};
    } catch { return {}; }
  });
  const [activeCat, setActiveCat] = useState(null);
  const sessionId = useRef(getSessionId());
  const saveTimeout = useRef(null);

  // Load picks from Supabase on mount
  useEffect(() => {
    supabase
      .from('picks')
      .select('picks')
      .eq('session_id', sessionId.current)
      .maybeSingle()
      .then(({ data }) => {
        if (data?.picks && Object.keys(data.picks).length > 0) {
          setPicks(data.picks);
          localStorage.setItem('goldticket_picks', JSON.stringify(data.picks));
        }
      });
  }, []);

  // Sync picks to localStorage + Supabase (debounced)
  useEffect(() => {
    localStorage.setItem('goldticket_picks', JSON.stringify(picks));
    clearTimeout(saveTimeout.current);
    saveTimeout.current = setTimeout(() => {
      supabase.from('picks').upsert({
        session_id: sessionId.current,
        picks,
        updated_at: new Date().toISOString(),
      });
    }, 600);
  }, [picks]);

  const handlePick = (catId, nominee) => {
    setPicks(prev => {
      if (prev[catId]?.name === nominee.name) {
        const { [catId]: _, ...rest } = prev;
        return rest;
      }
      return { ...prev, [catId]: nominee };
    });
  };

  if (activeCat) {
    return (
      <CategoryPage
        categoryId={activeCat}
        picks={picks}
        onPick={handlePick}
        onBack={() => setActiveCat(null)}
      />
    );
  }

  return (
    <HomePage
      picks={picks}
      onSelect={setActiveCat}
    />
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
