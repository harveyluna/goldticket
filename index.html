<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoldTicket – Oscar Predictions</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111111; color: #e5e5e5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; }
    .gold { color: #D4A843; } .gold-dim { color: #9a7a30; } .muted { color: #888; } .small { font-size: 0.78rem; }
    .badge { display: inline-flex; align-items: center; gap: 6px; border: 1px solid #D4A843; border-radius: 999px; padding: 5px 14px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em; color: #D4A843; }
    .badge svg { width: 13px; height: 13px; }
    .home { max-width: 900px; margin: 0 auto; padding: 48px 20px 80px; text-align: center; }
    .home h1 { font-size: clamp(2.8rem, 8vw, 5.2rem); font-weight: 800; line-height: 1.0; color: #f0e8d5; margin: 24px 0 16px; letter-spacing: -0.02em; }
    .home .subtitle { font-size: 1.05rem; color: #999; max-width: 480px; margin: 0 auto 48px; line-height: 1.6; }
    .progress-card { background: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 16px; padding: 36px 32px; display: inline-flex; flex-direction: column; align-items: center; gap: 14px; min-width: 220px; margin-bottom: 52px; }
    .ring-wrap { position: relative; width: 100px; height: 100px; }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .ring-center .big { font-size: 2rem; font-weight: 700; color: #f0e8d5; }
    .ring-center .of { font-size: 0.72rem; color: #666; }
    .progress-card .remain { color: #888; font-size: 0.9rem; }
    .categories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; text-align: left; }
    .cat-card { background: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 14px; padding: 18px 20px; cursor: pointer; transition: border-color 0.15s, background 0.15s; display: flex; align-items: flex-start; gap: 14px; }
    .cat-card:hover { border-color: #444; background: #222; }
    .cat-card.picked { border-color: #3a3020; background: #1e1c14; }
    .cat-icon { width: 40px; height: 40px; border-radius: 10px; background: #252525; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .cat-card.picked .cat-icon { background: #2e2812; }
    .cat-icon svg { width: 20px; height: 20px; }
    .cat-body { flex: 1; min-width: 0; }
    .cat-title { font-size: 0.95rem; font-weight: 600; color: #e5e5e5; }
    .cat-sub { font-size: 0.78rem; color: #666; margin-top: 2px; }
    .cat-pick { font-size: 0.82rem; color: #D4A843; margin-top: 6px; font-weight: 600; }
    .cat-pick-detail { font-size: 0.76rem; color: #888; }
    .cat-right { display: flex; align-items: center; flex-shrink: 0; }
    .check-circle { width: 22px; height: 22px; border-radius: 50%; background: #D4A843; display: flex; align-items: center; justify-content: center; }
    .check-circle svg { width: 13px; height: 13px; }
    .arrow-circle { width: 28px; height: 28px; border-radius: 50%; background: #252525; display: flex; align-items: center; justify-content: center; }
    .arrow-circle svg { width: 14px; height: 14px; color: #666; }
    .detail-page { max-width: 760px; margin: 0 auto; padding: 32px 20px 80px; }
    .back-btn { background: none; border: none; color: #888; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; font-size: 0.9rem; padding: 0; margin-bottom: 32px; transition: color 0.15s; }
    .back-btn:hover { color: #ccc; }
    .back-btn svg { width: 16px; height: 16px; }
    .detail-header { display: flex; align-items: center; gap: 18px; margin-bottom: 32px; }
    .detail-icon { width: 60px; height: 60px; border-radius: 14px; background: #2e2812; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .detail-icon svg { width: 30px; height: 30px; }
    .detail-header h2 { font-size: 1.6rem; font-weight: 700; color: #f0e8d5; }
    .detail-header p { font-size: 0.9rem; color: #888; margin-top: 4px; }
    .nominee-list { display: flex; flex-direction: column; gap: 10px; }
    .nominee-row { background: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px 18px; cursor: pointer; display: flex; align-items: center; gap: 14px; transition: border-color 0.15s, background 0.15s; }
    .nominee-row:hover { border-color: #444; background: #222; }
    .nominee-row.selected { border-color: #D4A843; background: #1e1c14; }
    .nominee-avatar { width: 40px; height: 40px; border-radius: 50%; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 600; color: #888; flex-shrink: 0; overflow: hidden; }
    .nominee-row.selected .nominee-avatar { background: #3a3020; color: #D4A843; }
    .nominee-info { flex: 1; min-width: 0; }
    .nominee-name { font-size: 0.95rem; font-weight: 500; color: #e5e5e5; }
    .nominee-detail { font-size: 0.8rem; color: #666; margin-top: 2px; }
    .nominee-row.selected .nominee-name { color: #f0e8d5; }
    .radio { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #333; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: border-color 0.15s; }
    .nominee-row:hover .radio { border-color: #666; }
    .nominee-row.selected .radio { border-color: #D4A843; background: #D4A843; }
    .radio-dot { width: 8px; height: 8px; border-radius: 50%; background: #111; }
    .reset-btn { margin-top: 32px; background: #D4A843; color: #111; border: none; border-radius: 10px; padding: 12px 28px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background 0.15s; }
    .reset-btn:hover { background: #c49530; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const CATEGORIES = [
  { id: 'best_picture', name: 'Best Picture', nominees: [
    { name: 'Anora', detail: '' }, { name: 'The Brutalist', detail: '' }, { name: 'A Complete Unknown', detail: '' },
    { name: 'Conclave', detail: '' }, { name: 'Dune: Part Two', detail: '' }, { name: 'Emilia Pérez', detail: '' },
    { name: "I'm Still Here", detail: '' }, { name: 'Nickel Boys', detail: '' }, { name: 'The Substance', detail: '' }, { name: 'Wicked', detail: '' }
  ]},
  { id: 'best_director', name: 'Best Director', nominees: [
    { name: 'Sean Baker', detail: 'Anora' }, { name: 'Brady Corbet', detail: 'The Brutalist' },
    { name: 'James Mangold', detail: 'A Complete Unknown' }, { name: 'Jacques Audiard', detail: 'Emilia Pérez' }, { name: 'Coralie Fargeat', detail: 'The Substance' }
  ]},
  { id: 'best_actor', name: 'Best Actor', nominees: [
    { name: 'Adrien Brody', detail: 'The Brutalist' }, { name: 'Timothée Chalamet', detail: 'A Complete Unknown' },
    { name: 'Colman Domingo', detail: 'Sing Sing' }, { name: 'Ralph Fiennes', detail: 'Conclave' }, { name: 'Sebastian Stan', detail: 'The Apprentice' }
  ]},
  { id: 'best_actress', name: 'Best Actress', nominees: [
    { name: 'Cynthia Erivo', detail: 'Wicked' }, { name: 'Karla Sofía Gascón', detail: 'Emilia Pérez' },
    { name: 'Mikey Madison', detail: 'Anora' }, { name: 'Demi Moore', detail: 'The Substance' }, { name: 'Fernanda Torres', detail: "I'm Still Here" }
  ]},
  { id: 'best_supporting_actor', name: 'Best Supporting Actor', nominees: [
    { name: 'Yura Borisov', detail: 'Anora' }, { name: 'Kieran Culkin', detail: 'A Real Pain' },
    { name: 'Jeremy Strong', detail: 'The Apprentice' }, { name: 'Zach Galifianakis', detail: 'A Real Pain' }, { name: 'Edward Norton', detail: 'A Complete Unknown' }
  ]},
  { id: 'best_supporting_actress', name: 'Best Supporting Actress', nominees: [
    { name: 'Monica Barbaro', detail: 'A Complete Unknown' }, { name: 'Ariana Grande', detail: 'Wicked' },
    { name: 'Felicity Jones', detail: 'The Brutalist' }, { name: 'Isabella Rossellini', detail: 'Conclave' }, { name: 'Zoe Saldana', detail: 'Emilia Pérez' }
  ]},
  { id: 'best_adapted_screenplay', name: 'Best Adapted Screenplay', nominees: [
    { name: 'A Complete Unknown', detail: 'James Mangold & Jay Cocks' }, { name: 'Conclave', detail: 'Edward Berger' },
    { name: 'Emilia Pérez', detail: 'Jacques Audiard' }, { name: 'Nickel Boys', detail: 'RaMell Ross' }, { name: 'Sing Sing', detail: 'Greg Kwedar & Clint Bentley' }
  ]},
  { id: 'best_original_screenplay', name: 'Best Original Screenplay', nominees: [
    { name: 'Anora', detail: 'Sean Baker' }, { name: 'The Brutalist', detail: 'Brady Corbet & Mona Fastvold' },
    { name: 'A Real Pain', detail: 'Jesse Eisenberg' }, { name: 'September 5', detail: 'Moritz Binder, Tim Fehlbaum & Alex David' }, { name: 'The Substance', detail: 'Coralie Fargeat' }
  ]},
  { id: 'best_animated_feature', name: 'Best Animated Feature', nominees: [
    { name: 'Flow', detail: '' }, { name: 'Inside Out 2', detail: '' }, { name: 'Memoir of a Snail', detail: '' },
    { name: 'Wallace & Gromit: Vengeance Most Fowl', detail: '' }, { name: 'The Wild Robot', detail: '' }
  ]},
  { id: 'best_international_feature', name: 'Best International Feature Film', nominees: [
    { name: 'The Girl with the Needle', detail: 'Denmark' }, { name: "I'm Still Here", detail: 'Brazil' },
    { name: 'The Seed of the Sacred Fig', detail: 'Germany' }, { name: 'Emilia Pérez', detail: 'France' }, { name: 'Flow', detail: 'Latvia' }
  ]}
];
const TrophyIcon = ({ color = '#D4A843' }) => (
  <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    <path d="M6 2h12v7a6 6 0 01-12 0V2z"/><path d="M6 4H3a2 2 0 000 4h3"/><path d="M18 4h3a2 2 0 010 4h-3"/><path d="M12 15v4"/><path d="M8 19h8"/>
  </svg>
);
const ArrowRight = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg>);
const ArrowLeft = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg>);
const CheckIcon = () => (<svg viewBox="0 0 24 24" fill="none" stroke="#111" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>);
function ProgressRing({ value, total }) {
  const r = 40, circ = 2 * Math.PI * r, dash = (total === 0 ? 0 : value / total) * circ;
  return (
    <div className="ring-wrap">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r={r} stroke="#2a2a2a" strokeWidth="7" fill="none"/>
        <circle cx="50" cy="50" r={r} stroke="#D4A843" strokeWidth="7" fill="none" strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{ transition: 'stroke-dasharray 0.4s ease' }}/>
      </svg>
      <div className="ring-center"><span className="big">{value}</span><span className="of">of {total}</span></div>
    </div>
  );
}
function HomePage({ picks, onSelect }) {
  const total = CATEGORIES.length, done = Object.keys(picks).length, remaining = total - done;
  return (
    <div className="home">
      <div className="badge"><TrophyIcon color="#D4A843"/> 97TH ACADEMY AWARDS</div>
      <h1>Oscar<br/>Predictions</h1>
      <p className="subtitle">Make your picks across {total} categories and see how you stack up on Hollywood's biggest night.</p>
      <div className="progress-card">
        <ProgressRing value={done} total={total}/>
        <span className="remain muted">{remaining === 0 ? '🎉 All picks made!' : `${remaining} ${remaining === 1 ? 'category' : 'categories'} remaining`}</span>
      </div>
      <div className="categories-grid">
        {CATEGORIES.map(cat => {
          const pick = picks[cat.id];
          return (
            <div key={cat.id} className={`cat-card${pick ? ' picked' : ''}`} onClick={() => onSelect(cat.id)}>
              <div className="cat-icon"><TrophyIcon color={pick ? '#D4A843' : '#555'}/></div>
              <div className="cat-body">
                <div className="cat-title">{cat.name}</div>
                <div className="cat-sub">{cat.nominees.length} nominees</div>
                {pick && (<><div className="cat-pick small" style={{marginTop:8,fontSize:'0.72rem',color:'#888',fontWeight:400}}>Your pick</div><div className="cat-pick">{pick.name}</div>{pick.detail && <div className="cat-pick-detail">{pick.detail}</div>}</>)}
              </div>
              <div className="cat-right">{pick ? <div className="check-circle"><CheckIcon/></div> : <div className="arrow-circle"><ArrowRight/></div>}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
function CategoryPage({ categoryId, picks, onPick, onBack }) {
  const cat = CATEGORIES.find(c => c.id === categoryId), current = picks[categoryId];
  const initials = (name) => { const p = name.split(' '); return p.length >= 2 ? (p[0][0] + p[p.length-1][0]).toUpperCase() : name.slice(0,2).toUpperCase(); };
  return (
    <div className="detail-page">
      <button className="back-btn" onClick={onBack}><ArrowLeft/> Back to categories</button>
      <div className="detail-header">
        <div className="detail-icon"><TrophyIcon color="#D4A843"/></div>
        <div><h2>{cat.name}</h2><p>Select your prediction for the winner</p></div>
      </div>
      <div className="nominee-list">
        {cat.nominees.map(n => {
          const sel = current && current.name === n.name;
          return (
            <div key={n.name} className={`nominee-row${sel ? ' selected' : ''}`} onClick={() => onPick(categoryId, n)}>
              <div className="nominee-avatar">{initials(n.name)}</div>
              <div className="nominee-info"><div className="nominee-name">{n.name}</div>{n.detail && <div className="nominee-detail">{n.detail}</div>}</div>
              <div className="radio">{sel && <div className="radio-dot"/>}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
function App() {
  const [picks, setPicks] = useState(() => { try { const s = localStorage.getItem('goldticket_picks'); return s ? JSON.parse(s) : {}; } catch { return {}; } });
  const [activeCat, setActiveCat] = useState(null);
  useEffect(() => { localStorage.setItem('goldticket_picks', JSON.stringify(picks)); }, [picks]);
  const handlePick = (catId, nominee) => setPicks(prev => ({ ...prev, [catId]: nominee }));
  if (activeCat) return <CategoryPage categoryId={activeCat} picks={picks} onPick={handlePick} onBack={() => setActiveCat(null)}/>;
  return <HomePage picks={picks} onSelect={setActiveCat}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
