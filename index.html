    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111111;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }

    /* ── Shared ── */
    .gold      { color: #D4A843; }
    .gold-dim  { color: #9a7a30; }
    .muted     { color: #888; }
    .small     { font-size: 0.78rem; }

    /* ── Badge ── */
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid #D4A843;
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #D4A843;
    }
    .badge svg { width: 13px; height: 13px; }

    /* ── Home ── */
    .home {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 20px 80px;
      text-align: center;
    }
    .home h1 {
      font-size: clamp(2.8rem, 8vw, 5.2rem);
      font-weight: 800;
      line-height: 1.0;
      color: #f0e8d5;
      margin: 24px 0 16px;
      letter-spacing: -0.02em;
    }
    .home .subtitle {
      font-size: 1.05rem;
      color: #999;
      max-width: 480px;
      margin: 0 auto 48px;
      line-height: 1.6;
    }

    /* ── Progress ring ── */
    .progress-card {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 36px 32px;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      min-width: 220px;
      margin-bottom: 52px;
    }
    .ring-wrap { position: relative; width: 100px; height: 100px; }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .ring-center .big { font-size: 2rem; font-weight: 700; color: #f0e8d5; }
    .ring-center .of  { font-size: 0.72rem; color: #666; }
    .progress-card .remain { color: #888; font-size: 0.9rem; }

    /* ── Grid ── */
    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
      text-align: left;
    }

    /* ── Category card ── */
    .cat-card {
      background: linear-gradient(180deg, #1d1d1d 0%, #171717 100%);
      border: 1px solid #2a2a2a;
      border-radius: 18px;
      padding: 16px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 132px;
    }

    .cat-card:hover {
      border-color: #5a4a22;
      background: linear-gradient(180deg, #222222 0%, #1a1a1a 100%);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.28);
    }

    .cat-card.picked {
      border-color: #6f5720;
      background: linear-gradient(180deg, #211d14 0%, #181611 100%);
      box-shadow: 0 10px 30px rgba(0,0,0,0.24);
    }

    .cat-icon {
      width: 100px;
      height: 100px;
      min-width: 100px;
      min-height: 100px;
      border-radius: 14px;
      background: #252525;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
      border: 1px solid #2f2f2f;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cat-card.picked .cat-icon {
      border-color: #6f5720;
      background: #2a2417;
    }

    .cat-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cat-icon::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.02) 0%, rgba(0,0,0,0.22) 100%);
      pointer-events: none;
    }

    .cat-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .cat-title {
      font-size: 1rem;
      font-weight: 700;
      color: #f3ead7;
      line-height: 1.2;
    }
    .cat-sub {
      font-size: 0.78rem;
      color: #7e7e7e;
      margin-top: 4px;
    }
    .cat-pick {
      margin-top: 10px;
      font-size: 0.88rem;
      color: #D4A843;
      font-weight: 700;
      line-height: 1.2;
    }
    .cat-pick-detail {
      font-size: 0.76rem;
      color: #9a9a9a;
      margin-top: 3px;
    }

    .cat-right {
      display: flex;
      align-items: center;
      align-self: center;
      flex-shrink: 0;
    }

    .check-circle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #D4A843;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 4px rgba(212,168,67,0.12);
    }
    .check-circle svg {
      width: 14px;
      height: 14px;
    }

    .arrow-circle {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #232323;
      border: 1px solid #303030;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .arrow-circle svg {
      width: 15px;
      height: 15px;
      color: #777;
    }

    .detail-page {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }
    .back-btn {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      padding: 0;
      margin-bottom: 32px;
      transition: color 0.15s;
    }
    .back-btn:hover { color: #ccc; }
    .back-btn svg { width: 16px; height: 16px; }

    .detail-header {
      display: flex; align-items: center; gap: 18px;
      margin-bottom: 32px;
    }
    .detail-icon {
      width: 60px; height: 60px;
      border-radius: 14px;
      background: #2e2812;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .detail-icon svg { width: 30px; height: 30px; }
    .detail-header h2 { font-size: 1.6rem; font-weight: 700; color: #f0e8d5; }
    .detail-header p  { font-size: 0.9rem; color: #888; margin-top: 4px; }

    /* ── Nominee row ── */
    .nominee-list { display: flex; flex-direction: column; gap: 10px; }
    .nominee-row {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 14px 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.15s, background 0.15s;
    }
    .nominee-row:hover { border-color: #444; background: #222; }
    .nominee-row.selected {
      border-color: #D4A843;
      background: #1e1c14;
    }

    .nominee-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: #2a2a2a;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      font-weight: 600;
      color: #888;
      flex-shrink: 0;
      overflow: hidden;
    }
    .nominee-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
    .nominee-avatar img.poster {
      object-position: center center;
    }
    .nominee-row.selected .nominee-avatar { background: #3a3020; color: #D4A843; }
    .nominee-row.selected .nominee-avatar img { outline: 2px solid #D4A843; border-radius: 50%; }

    .nominee-info { flex: 1; min-width: 0; }
    .nominee-name   { font-size: 0.95rem; font-weight: 500; color: #e5e5e5; }
    .nominee-detail { font-size: 0.8rem; color: #666; margin-top: 2px; }
    .nominee-row.selected .nominee-name { color: #f0e8d5; }

    .radio {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid #333;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s;
    }
    .nominee-row:hover .radio { border-color: #666; }
    .nominee-row.selected .radio {
      border-color: #D4A843;
      background: #D4A843;
    }
    .radio-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #111;
    }

    /* ── All done ── */

      text-align: center;
      padding: 80px 20px;
    }
    .all-done .trophy-big {
      font-size: 4rem;
      margin-bottom: 24px;
    }
    .all-done h2 {
      font-size: 2rem; font-weight: 700;
      color: #f0e8d5; margin-bottom: 12px;
    }
    .all-done p { color: #888; font-size: 1rem; }
    .reset-btn {
      margin-top: 32px;
      background: #D4A843;
      color: #111;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .reset-btn:hover { background: #c49530; }

    @media (max-width: 640px) {
      .categories-grid {
        grid-template-columns: 1fr;
      }

      .cat-card {
        gap: 18px;
        padding: 20px 22px;

      }

      .cat-icon {
        width: 88px;
        height: 88px;
        min-width: 88px;
        min-height: 88px;
      }
    }

      { name: 'Sentimental Value',       detail: 'Norway',  photo: 'https://upload.wikimedia.org/wikipedia/en/5/5c/Sentimental_Value_2025.jpeg', photoType: 'poster' },
      { name: 'Sirāt',                   detail: 'Spain',   photo: 'https://upload.wikimedia.org/wikipedia/en/9/91/Sirat_2025.jpeg', photoType: 'poster' },
      { name: 'The Voice of Hind Rajab', detail: 'Tunisia', photo: 'https://upload.wikimedia.org/wikipedia/en/b/b5/The_Voice_of_Hind_Rajab_film_poster.jpg', photoType: 'poster' },
    ],
  },
];

/* ─────────────────────────────────────────────
   ICONS
───────────────────────────────────────────── */
const TrophyIcon = ({ color = '#D4A843' }) => (
  <svg viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    <path d="M6 2h12v7a6 6 0 01-12 0V2z"/>
    <path d="M6 4H3a2 2 0 000 4h3"/>
    <path d="M18 4h3a2 2 0 010 4h-3"/>
    <path d="M12 15v4"/>
    <path d="M8 19h8"/>
  </svg>
);

const ArrowRight = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M9 18l6-6-6-6"/>
  </svg>
);

const ArrowLeft = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M15 18l-6-6 6-6"/>
  </svg>
);

const CheckIcon = () => (
  <svg viewBox="0 0 24 24" fill="none" stroke="#111" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
);

/* ─────────────────────────────────────────────
   PROGRESS RING
───────────────────────────────────────────── */
function ProgressRing({ value, total }) {
  const r = 40;
  const circ = 2 * Math.PI * r;
  const pct = total === 0 ? 0 : value / total;
  const dash = pct * circ;

  return (
    <div className="ring-wrap">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r={r} stroke="#2a2a2a" strokeWidth="7" fill="none"/>
        <circle
          cx="50" cy="50" r={r}
          stroke="#D4A843" strokeWidth="7" fill="none"
          strokeDasharray={`${dash} ${circ}`}
          strokeLinecap="round"
          style={{ transition: 'stroke-dasharray 0.4s ease' }}
        />
      </svg>
      <div className="ring-center">
        <span className="big">{value}</span>
        <span className="of">of {total}</span>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   HOME PAGE
───────────────────────────────────────────── */
function HomePage({ picks, onSelect }) {
  const total = CATEGORIES.length;
  const done  = Object.keys(picks).length;
  const remaining = total - done;

  return (
    <div className="home">
      <div className="badge">
        <TrophyIcon color="#D4A843"/>
        98TH ACADEMY AWARDS
      </div>

      <h1>Oscar<br/>Predictions</h1>
      <p className="subtitle">
        Make your picks across {total} categories and see how<br/>
        you stack up on Hollywood&apos;s biggest night.
      </p>

      <div className="progress-card">
        <ProgressRing value={done} total={total}/>
        <span className="remain muted">
          {remaining === 0 ? '🎉 All picks made!' : `${remaining} ${remaining === 1 ? 'category' : 'categories'} remaining`}
        </span>
      </div>

      <div className="categories-grid">
        {CATEGORIES.map(cat => {
          const pick = picks[cat.id];
          const thumb = pick?.photo || cat.nominees[0]?.photo;

          return (
            <div
              key={cat.id}
              className={`cat-card${pick ? ' picked' : ''}`}
              onClick={() => onSelect(cat.id)}
            >
              <div className="cat-icon">
                {thumb ? (
                  <img src={thumb} alt={cat.name} />
                ) : (
                  <TrophyIcon color={pick ? '#D4A843' : '#555'} />
                )}
              </div>

              <div className="cat-body">
                <div className="cat-title">{cat.name}</div>
                <div className="cat-sub">{cat.nominees.length} nominees</div>

                {pick && (
                  <>
                    <div
                      className="small"
                      style={{ marginTop: 8, fontSize: '0.72rem', color: '#888', fontWeight: 400 }}
                    >
                      Your pick
                    </div>
                    <div className="cat-pick">{pick.name}</div>
                    {pick.detail && <div className="cat-pick-detail">{pick.detail}</div>}
                  </>
                )}
              </div>

              <div className="cat-right">
                {pick ? (
                  <div className="check-circle"><CheckIcon/></div>
                ) : (
                  <div className="arrow-circle"><ArrowRight/></div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   CATEGORY PAGE
───────────────────────────────────────────── */
function CategoryPage({ categoryId, picks, onPick, onBack }) {
  const cat = CATEGORIES.find(c => c.id === categoryId);
  const current = picks[categoryId];

  const initials = (name) => {
    const parts = name.split(' ');
    return parts.length >= 2
      ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase()
      : name.slice(0, 2).toUpperCase();
  };

  return (
    <div className="detail-page">
      <button className="back-btn" onClick={onBack}>
        <ArrowLeft/> Back to categories
      </button>

      <div className="detail-header">
        <div className="detail-icon">
          <TrophyIcon color="#D4A843"/>
        </div>
        <div>
          <h2>{cat.name}</h2>
          <p>Select your prediction for the winner</p>
        </div>
      </div>

      <div className="nominee-list">
        {cat.nominees.map(n => {
          const sel = current && current.name === n.name;
          return (
            <div
              key={n.name}
              className={`nominee-row${sel ? ' selected' : ''}`}
              onClick={() => onPick(categoryId, n)}
            >
              <div className="nominee-avatar">
                {n.photo
                  ? (
                    <img
                      src={n.photo}
                      alt={n.name}
                      className={n.photoType === 'poster' ? 'poster' : ''}
                      onError={e => {
                        e.target.style.display = 'none';
                        e.target.parentNode.textContent = initials(n.name);
                      }}
                    />
                  )
                  : initials(n.name)
                }
              </div>
              <div className="nominee-info">
                <div className="nominee-name">{n.name}</div>
                {n.detail && <div className="nominee-detail">{n.detail}</div>}
              </div>
              <div className="radio">
                {sel && <div className="radio-dot"/>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   APP ROOT
───────────────────────────────────────────── */
function App() {
  const [picks, setPicks] = useState(() => {
    try {
      const saved = localStorage.getItem('goldticket_picks');
      return saved ? JSON.parse(saved) : {};
    } catch {
      return {};
    }
  });

  const [activeCat, setActiveCat] = useState(null);

  useEffect(() => {
    localStorage.setItem('goldticket_picks', JSON.stringify(picks));
  }, [picks]);

  const handlePick = (catId, nominee) => {
    setPicks(prev => ({ ...prev, [catId]: nominee }));
  };

  if (activeCat) {
    return (
      <CategoryPage
        categoryId={activeCat}
        picks={picks}
        onPick={handlePick}
        onBack={() => setActiveCat(null)}
      />
    );
  }

  return (
    <HomePage
      picks={picks}
      onSelect={setActiveCat}
    />
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
