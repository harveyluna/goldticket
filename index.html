<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CultureBrackets – Oscar Predictions</title>
  <link rel="icon" type="image/svg+xml" href="images/cb-icon.svg">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111111;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }

    /* ── Shared ── */
    .gold      { color: #D4A843; }
    .gold-dim  { color: #9a7a30; }
    .muted     { color: #888; }
    .small     { font-size: 0.78rem; }

    /* ── Badge ── */
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid #D4A843;
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #D4A843;
    }
    .badge svg { width: 13px; height: 13px; }

    /* ── Group Nav ── */
    .group-nav {
      background: #161616;
      border-bottom: 1px solid #2a2a2a;
      position: sticky; top: 0; z-index: 50;
    }
    .group-nav-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 0;
      overflow-x: auto;
    }
    .group-nav-name {
      color: #D4A843;
      font-weight: 700;
      font-size: 0.88rem;
      padding: 13px 0;
      margin-right: 16px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .nav-tab {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 13px 14px;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .nav-tab:hover { color: #ccc; }
    .nav-tab.active { color: #D4A843; border-bottom-color: #D4A843; }
    .nav-tab-spacer { flex: 1; min-width: 8px; }
    .nav-logo { height: 22px; width: auto; flex-shrink: 0; margin-right: 14px; display: block; }
    .invite-btn {
      background: #1e1c14;
      border: 1px solid #3a3020;
      color: #D4A843;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .invite-btn:hover { background: #2a2518; }

    /* ── Home ── */
    .home {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 20px 80px;
      text-align: center;
    }
    .home h1 {
      font-size: clamp(2.8rem, 8vw, 5.2rem);
      font-weight: 800;
      line-height: 1.0;
      color: #f0e8d5;
      margin: 24px 0 16px;
      letter-spacing: -0.02em;
    }
    .home .subtitle {
      font-size: 1.05rem;
      color: #999;
      max-width: 480px;
      margin: 0 auto 32px;
      line-height: 1.6;
    }

    /* ── Group section on home ── */
    .group-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .group-strip-info {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 0.85rem;
      color: #888;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .group-strip-info strong { color: #f0e8d5; font-weight: 700; }
    .group-strip-btn {
      background: none;
      border: 1px solid #2a2a2a;
      color: #666;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .group-strip-btn:hover { border-color: #444; color: #ccc; }
    .create-group-btn {
      background: #1e1c14;
      border: 1px solid #3a3020;
      color: #D4A843;
      border-radius: 10px;
      padding: 9px 20px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      transition: background 0.15s;
    }
    .create-group-btn:hover { background: #2a2518; }

    /* ── Progress ring ── */
    .progress-card {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 36px 32px;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      min-width: 220px;
      margin-bottom: 52px;
    }
    .ring-wrap { position: relative; width: 100px; height: 100px; }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .ring-center .big { font-size: 2rem; font-weight: 700; color: #f0e8d5; }
    .ring-center .of  { font-size: 0.72rem; color: #666; }
    .progress-card .remain { color: #888; font-size: 0.9rem; }
    .clear-btn {
      background: none;
      border: none;
      color: #555;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      font-family: inherit;
      margin-top: 2px;
    }
    .clear-btn:hover { color: #aaa; background: #222; }
    .clear-btn.confirm { color: #e05252; }
    .restore-picks-btn { background: none; border: none; color: #555; font-size: 0.78rem; cursor: pointer; padding: 2px 4px; font-family: inherit; text-decoration: underline; text-underline-offset: 2px; transition: color 0.15s; margin-top: 6px; display: block; flex-basis: 100%; text-align: center; }
    .restore-picks-btn:hover { color: #aaa; }
    .export-pdf-btn { background: none; border: 1px solid #3a3020; color: #9a7a30; font-size: 0.78rem; cursor: pointer; padding: 4px 10px; border-radius: 6px; font-family: inherit; transition: all 0.15s; margin-top: 8px; }
    .export-pdf-btn:hover { background: #1e1c14; border-color: #D4A843; color: #D4A843; }
    .save-picks-btn { background: #1a2510; border: 1px solid #3a5a20; color: #7ec850; font-size: 0.85rem; cursor: pointer; padding: 7px 18px; border-radius: 8px; transition: all 0.2s; font-family: inherit; margin-top: 10px; }
    .save-picks-btn:hover:not(:disabled) { background: #223015; border-color: #5a8a35; }
    .save-picks-btn:disabled { opacity: 0.6; cursor: default; }
    .save-picks-btn.saved { color: #4caf50; border-color: #4caf50; background: #122010; }

    /* ── Grid ── */
    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
      text-align: left;
    }

    /* ── Category card ── */
    .cat-card {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 18px 20px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .cat-card:hover { border-color: #444; background: #222; }
    .cat-card.picked { border-color: #3a3020; background: #1e1c14; }
    .cat-card.correct { border-color: #1a4020; background: #131f14; }
    .cat-card.wrong   { border-color: #3a1a1a; background: #1f1313; }

    .cat-icon {
      width: 87px; height: 130px; min-width: 87px; min-height: 130px;
      border-radius: 14px; background: #252525; overflow: hidden; flex-shrink: 0;
      position: relative; border: 1px solid #2f2f2f;
      display: flex; align-items: center; justify-content: center;
    }
    .cat-icon svg { width: 28px; height: 28px; position: relative; z-index: 0; }
    .cat-icon img {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover; display: block;
      z-index: 1;
    }

    .cat-body { flex: 1; min-width: 0; }
    .cat-title { font-size: 0.95rem; font-weight: 600; color: #e5e5e5; }
    .cat-sub   { font-size: 0.78rem; color: #666; margin-top: 2px; }
    .cat-pick  { font-size: 0.82rem; color: #D4A843; margin-top: 6px; font-weight: 600; }
    .cat-pick-detail { font-size: 0.76rem; color: #888; }
    .cat-winner { font-size: 0.76rem; color: #666; margin-top: 3px; }

    .cat-right {
      display: flex; align-items: center;
      flex-shrink: 0;
    }
    .check-circle {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #D4A843;
      display: flex; align-items: center; justify-content: center;
    }
    .check-circle.green { background: #2d8a3e; }
    .check-circle.red   { background: #8a2d2d; }
    .check-circle svg { width: 13px; height: 13px; }
    .dash-circle {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #444;
      display: flex; align-items: center; justify-content: center;
      color: #aaa; font-size: 1rem; font-weight: 700; line-height: 1;
    }
    .arrow-circle {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #252525;
      display: flex; align-items: center; justify-content: center;
    }
    .arrow-circle svg { width: 14px; height: 14px; color: #666; }

    /* ── Category detail ── */
    .detail-page {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }
    .back-btn {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
      padding: 0;
      margin-bottom: 32px;
      transition: color 0.15s;
    }
    .back-btn:hover { color: #ccc; }
    .back-btn svg { width: 16px; height: 16px; }

    .detail-header {
      display: flex; align-items: center; gap: 18px;
      margin-bottom: 32px;
    }
    .detail-icon {
      width: 60px; height: 60px;
      border-radius: 14px;
      background: #2e2812;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .detail-icon svg { width: 30px; height: 30px; }
    .detail-header h2 { font-size: 1.6rem; font-weight: 700; color: #f0e8d5; }
    .detail-header p  { font-size: 0.9rem; color: #888; margin-top: 4px; }

    /* ── Winner banner on detail page ── */
    .winner-banner {
      background: #1a4020;
      border: 1px solid #2d6030;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 0.85rem;
      color: #5fb870;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Nominee row ── */
    .nominee-list { display: flex; flex-direction: column; gap: 10px; }
    .nominee-row {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 14px 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.15s, background 0.15s;
    }
    .nominee-row:hover { border-color: #444; background: #222; }
    .nominee-row.selected {
      border-color: #D4A843;
      background: #1e1c14;
    }
    .nominee-row.winner-row {
      border-color: #2d6030;
      background: #131f14;
    }

    .nominee-avatar {
      width: 87px; height: 130px;
      border-radius: 8px;
      background: #2a2a2a;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      font-weight: 600;
      color: #888;
      flex-shrink: 0;
      overflow: hidden;
    }
    .nominee-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }
    .nominee-avatar img.poster {
      object-position: center center;
    }
    .nominee-row.selected .nominee-avatar { background: #3a3020; color: #D4A843; }
    .nominee-row.selected .nominee-avatar img { outline: 2px solid #D4A843; border-radius: 8px; }
    .nominee-row.winner-row .nominee-avatar img { outline: 2px solid #2d6030; border-radius: 8px; }

    .nominee-info { flex: 1; min-width: 0; }
    .nominee-name   { font-size: 0.95rem; font-weight: 500; color: #e5e5e5; }
    .nominee-detail { font-size: 0.8rem; color: #666; margin-top: 2px; }
    .nominee-row.selected .nominee-name { color: #f0e8d5; }
    .winner-label { font-size: 0.72rem; color: #5fb870; font-weight: 700; margin-top: 3px; }
    .friend-picks { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
    .friend-tag {
      font-size: 0.68rem; font-weight: 500;
      background: #1e1e2e; color: #9090cc;
      border: 1px solid #2e2e50;
      border-radius: 4px; padding: 2px 7px;
    }

    /* ── Lock UI ── */
    .lock-strip {
      background: #1a1a2e;
      border: 1px solid #2e2e50;
      border-radius: 10px;
      padding: 10px 16px;
      margin: 0 0 14px;
      font-size: 0.82rem;
      color: #aaaacc;
      text-align: center;
    }
    .lock-strip.locked {
      background: #1e1020;
      border-color: #5a2070;
      color: #cc88ee;
    }
    .watch-link {
      color: #a78bfa;
      text-decoration: underline;
      font-weight: 500;
      white-space: nowrap;
    }
    .watch-link:hover { color: #c4b5fd; }
    .lock-banner {
      background: #1e1020;
      border: 1px solid #5a2070;
      border-radius: 10px;
      padding: 10px 16px;
      margin: 0 0 14px;
      font-size: 0.85rem;
      color: #cc88ee;
      text-align: center;
    }
    .nominee-list.picks-locked .nominee-row:not(.winner-row) {
      opacity: 0.65;
      cursor: default;
    }
    .nominee-row.locked-row:not(.winner-row):not(.selected) {
      pointer-events: none;
    }

    .radio {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid #333;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s;
    }
    .nominee-row:hover .radio { border-color: #666; }
    .nominee-row.selected .radio {
      border-color: #D4A843;
      background: #D4A843;
    }
    .nominee-row.winner-row .radio {
      border-color: #2d6030;
      background: #2d6030;
    }
    .radio-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #111;
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    .modal {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 36px 32px;
      max-width: 440px;
      width: 100%;
    }
    .modal h2 { font-size: 1.5rem; font-weight: 700; color: #f0e8d5; margin-bottom: 8px; }
    .modal p  { color: #888; font-size: 0.9rem; margin-bottom: 24px; line-height: 1.6; }
    .modal-input {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px 16px;
      color: #e5e5e5;
      font-size: 0.95rem;
      margin-bottom: 14px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .modal-input:focus { border-color: #D4A843; }
    .modal-btn {
      width: 100%;
      background: #D4A843;
      color: #111;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }
    .modal-btn:hover { background: #c49530; }
    .modal-btn:disabled { background: #444; color: #666; cursor: not-allowed; }
    .modal-cancel {
      width: 100%;
      background: none;
      border: none;
      color: #666;
      padding: 10px;
      font-size: 0.9rem;
      cursor: pointer;
      margin-top: 8px;
      transition: color 0.15s;
      font-family: inherit;
    }
    .modal-cancel:hover { color: #999; }
    .member-list-label {
      font-size: 0.78rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
      text-align: left;
    }
    .member-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .member-chip {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 0.9rem;
      color: #e5e5e5;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      font-family: inherit;
    }
    .member-chip:hover { background: #333; border-color: #d4af37; }
    .member-chip.selected { background: #3a3010; border-color: #d4af37; color: #f0e8d5; }
    .or-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      color: #555;
      font-size: 0.85rem;
    }
    .or-divider::before, .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #333;
    }
    .invite-box {
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .invite-box span {
      flex: 1;
      font-size: 0.78rem;
      color: #888;
      word-break: break-all;
    }
    .copy-btn {
      background: #2a2a2a;
      border: none;
      color: #D4A843;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
      font-family: inherit;
    }
    .copy-btn:hover { background: #333; }

    /* ── Leaderboard ── */
    .leaderboard-page {
      max-width: 700px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }
    .leaderboard-page h2 { font-size: 1.8rem; font-weight: 700; color: #f0e8d5; margin-bottom: 6px; }
    .page-sub { color: #666; font-size: 0.9rem; margin-bottom: 32px; }
    .lb-row {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 8px;
    }
    .lb-row.me { border-color: #3a3020; background: #1e1c14; }
    .lb-rank { font-size: 1.4rem; width: 30px; text-align: center; flex-shrink: 0; }
    .lb-name { flex: 1; font-size: 0.95rem; font-weight: 600; color: #e5e5e5; }
    .lb-name .you-badge {
      font-size: 0.7rem;
      background: #2a2518;
      color: #D4A843;
      border-radius: 4px;
      padding: 2px 6px;
      margin-left: 8px;
      font-weight: 700;
    }
    .lb-score { text-align: right; }
    .lb-score .big { font-size: 1.3rem; font-weight: 800; color: #f0e8d5; }
    .lb-score .of { font-size: 0.75rem; color: #555; }
    .lb-score .picks { font-size: 0.75rem; color: #555; margin-top: 1px; }
    .lb-no-winners {
      text-align: center;
      padding: 48px 20px;
      color: #555;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    /* ── Winners Entry ── */
    .winners-page {
      max-width: 700px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }
    .winners-page h2 { font-size: 1.8rem; font-weight: 700; color: #f0e8d5; margin-bottom: 6px; }
    .scrape-btn {
      background: #1e1c14;
      border: 1px solid #3a3020;
      color: #D4A843;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
      transition: background 0.15s;
      font-family: inherit;
    }
    .scrape-btn:hover { background: #2a2518; }
    .scrape-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .winner-cat-card {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 8px;
    }
    .winner-cat-name {

// ── Supabase helpers ──────────────────────────────────────────────────────────
// These avoid relying on unique constraints (upsert + onConflict requires a DB
// constraint; without it, every upsert inserts a new row, making reads fail).

// group_picks is now keyed by (group_id, member_id) — stable across all sessions/devices.
async function saveGroupPicks(groupId, memberId, picksData) {
  const { error } = await supabase.from('group_picks')
    .upsert({ group_id: groupId, member_id: memberId, picks: picksData }, { onConflict: 'group_id,member_id' });
  if (error) console.error('[saveGroupPicks]', error);
}

async function saveGlobalPicks(sid, picksData) {
  const { error } = await supabase.from('picks')
    .upsert({ session_id: sid, picks: picksData }, { onConflict: 'session_id' });
  if (error) console.error('[saveGlobalPicks]', error);
}

async function fetchGroupPicks(groupId, memberId) {
  const { data, error } = await supabase.from('group_picks')
    .select('picks').eq('group_id', groupId).eq('member_id', memberId).maybeSingle();
  if (error) console.error('[fetchGroupPicks]', error);
  const p = data?.picks;
  return p && Object.keys(p).length > 0 ? p : null;
}

async function fetchGlobalPicks(sid) {
  const { data, error } = await supabase.from('picks')

  const p = data?.picks;

/* ─────────────────────────────────────────────
   WIKIPEDIA SCRAPER
───────────────────────────────────────────── */
async function scrapeWikipediaWinners() {
  const url = 'https://en.wikipedia.org/w/api.php?' + new URLSearchParams({
    action: 'parse',
    page: '98th_Academy_Awards',
    prop: 'text',
    format: 'json',
    origin: '*',
  });

  const res = await fetch(url);
  const data = await res.json();
  const html = data?.parse?.text?.['*'];
  if (!html) throw new Error('Could not fetch Wikipedia page');

  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  const titleToId = {
    'Best Picture': 'best_picture',
    'Best Director': 'best_director',
    'Best Actor': 'best_actor',
    'Best Actress': 'best_actress',
    'Best Supporting Actor': 'best_supporting_actor',
    'Best Supporting Actress': 'best_supporting_actress',
    'Best Adapted Screenplay': 'best_adapted_screenplay',
    'Best Original Screenplay': 'best_original_screenplay',
    'Best Animated Feature': 'best_animated_feature',
    'Best Animated Feature Film': 'best_animated_feature',
    'Best International Feature Film': 'best_international_feature',
    'Best Cinematography': 'best_cinematography',
    'Best Film Editing': 'best_film_editing',
    'Best Original Score': 'best_original_score',
    'Best Original Song': 'best_original_song',
    'Best Production Design': 'best_production_design',
    'Best Costume Design': 'best_costume_design',
    'Best Makeup and Hairstyling': 'best_makeup_hairstyling',
    'Best Sound': 'best_sound',
    'Best Visual Effects': 'best_visual_effects',
    'Best Documentary Feature Film': 'best_documentary_feature',
    'Best Casting': 'best_casting',
  };

  const winners = {};
  const headlineEls = doc.querySelectorAll('.mw-headline');

  headlineEls.forEach(headline => {
    const title = headline.textContent.trim();
    const catId = titleToId[title];
    if (!catId) return;

    const heading = headline.closest('h2, h3, h4');
    let el = heading?.nextElementSibling;

    while (el && !['H2', 'H3', 'H4'].includes(el.tagName)) {
      // Strategy 1: bold text = winner
      const bolds = el.querySelectorAll('b');
      for (const bold of bolds) {
        const boldText = bold.textContent.trim().replace(/["'""]/g, '');
        const cat = CATEGORIES.find(c => c.id === catId);
        if (cat) {
          const match = cat.nominees.find(n => {
            const nName = n.name.replace(/["'""]/g, '').toLowerCase();
            const bText = boldText.toLowerCase();
            return bText === nName || bText.includes(nName) || nName.includes(bText);
          });
          if (match) { winners[catId] = match.name; return; }
        }
      }
      // Strategy 2: highlighted table row
      const winnerRows = el.querySelectorAll('[class*="winner"], [style*="background:#FAEB86"], [style*="background: #FAEB86"], [style*="background:#eedd82"]');
      for (const row of winnerRows) {
        const rowText = row.textContent;
        const cat = CATEGORIES.find(c => c.id === catId);
        if (cat) {
          const match = cat.nominees.find(n => {
            const nName = n.name.replace(/["'""]/g, '').toLowerCase();
            return rowText.toLowerCase().includes(nName);
          });
          if (match) { winners[catId] = match.name; return; }
        }
      }
      el = el.nextElementSibling;
    }
  });

  return winners;
}

/* Picks lock at 6 pm CST (UTC-6) on Sunday March 15, 2026 */
const LOCK_TIME = new Date('2026-03-15T18:00:00-06:00');

function formatCountdown(ms) {
  if (ms <= 0) return null;
  const totalSec = Math.floor(ms / 1000);
  const d = Math.floor(totalSec / 86400);
  const h = Math.floor((totalSec % 86400) / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (d > 0) return `${d}d ${h}h ${m}m ${s}s`;
  if (h > 0) return `${h}h ${m}m ${s}s`;
  return `${m}m ${s}s`;
}

/* proxy Wikipedia Commons URLs through wsrv.nl to avoid hotlinking restrictions */
const proxyImg = url => {
  if (!url) return '';
  if (url.includes('upload.wikimedia.org/wikipedia/commons/'))
    return 'https://wsrv.nl/?url=' + url.replace('https://', '');
  return url;
};

/* ─────────────────────────────────────────────
   PROGRESS RING
───────────────────────────────────────────── */
function ProgressRing({ value, total }) {
  const r = 40, circ = 2 * Math.PI * r;
  const dash = (total === 0 ? 0 : value / total) * circ;
  return (
    <div className="ring-wrap">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r={r} stroke="#2a2a2a" strokeWidth="7" fill="none"/>
        <circle cx="50" cy="50" r={r} stroke="#D4A843" strokeWidth="7" fill="none"
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          style={{ transition: 'stroke-dasharray 0.4s ease' }}
        />
      </svg>
      <div className="ring-center">
        <span className="big">{value}</span>
        <span className="of">of {total}</span>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   GROUP MODAL
───────────────────────────────────────────── */
function GroupModal({ mode, groupName, inviteUrl, existingMembers = [], onClose, onCreate, onJoin, defaultCode = '' }) {
  const [name, setName] = useState('');
  const [displayName, setDisplayName] = useState(mode === 'entercode' ? defaultCode : '');
  const [copied, setCopied] = useState(false);
  const [loading, setLoading] = useState(false);

  const handleCopy = async () => {
    try {
      await navigator.clipboard.writeText(inviteUrl);
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    } catch {}
  };

  if (mode === 'created') return (
    <div className="modal-overlay">
      <div className="modal">
        <h2>🎉 Group Created!</h2>
        <p>Share this invite link with friends so they can join <strong style={{color:'#f0e8d5'}}>{groupName}</strong>.</p>
        <div className="invite-box">
          <span>{inviteUrl}</span>
          <button className="copy-btn" onClick={handleCopy}>{copied ? '✓ Copied!' : 'Copy'}</button>
        </div>
        <button className="modal-btn" onClick={onClose}>Start Picking →</button>
      </div>
    </div>
  );

  if (mode === 'create') return (
    <div className="modal-overlay">
      <div className="modal">
        <h2>Create a Group</h2>
        <p>Name your group and invite friends to pick together and compete on the leaderboard.</p>
        <input className="modal-input" placeholder="Group name (e.g. Movie Night Crew)" value={name}
          onChange={e => setName(e.target.value)} autoFocus />
        <input className="modal-input" placeholder="Your display name" value={displayName}
          onChange={e => setDisplayName(e.target.value)}
          onKeyDown={async e => {
            if (e.key === 'Enter' && name.trim() && displayName.trim() && !loading) {
              setLoading(true);
              await onCreate(name.trim(), displayName.trim());
              setLoading(false);
            }
          }}
        />
        <button className="modal-btn" disabled={!name.trim() || !displayName.trim() || loading}
          onClick={async () => { setLoading(true); await onCreate(name.trim(), displayName.trim()); setLoading(false); }}>
          {loading ? 'Creating…' : 'Create Group'}
        </button>
        <button className="modal-cancel" onClick={onClose}>Cancel</button>
      </div>
    </div>
  );

  if (mode === 'join') return (
    <div className="modal-overlay">
      <div className="modal">
        <h2>Join Group</h2>
        <p>You've been invited to join <strong style={{color:'#f0e8d5'}}>{groupName}</strong>.</p>

        {existingMembers.length > 0 && (<>
          <p className="member-list-label">Returning? Select your name</p>
          <div className="member-chips">
            {existingMembers.map(m => (
              <button key={m} className={`member-chip${displayName === m ? ' selected' : ''}`}
                onClick={() => setDisplayName(displayName === m ? '' : m)}>
                {m}
              </button>
            ))}
          </div>
          <div className="or-divider">or enter a new name</div>
        </>)}

        <input className="modal-input"
          placeholder={existingMembers.length > 0 ? 'New display name…' : 'Your display name'}
          value={displayName}
          onChange={e => setDisplayName(e.target.value)}
          onKeyDown={async e => {
            if (e.key === 'Enter' && displayName.trim() && !loading) {
              setLoading(true);
              try { await onJoin(displayName.trim()); } catch(err) { console.error('[join]', err); }
              setLoading(false);
            }
          }}
          autoFocus={existingMembers.length === 0}
        />
        <button className="modal-btn" disabled={!displayName.trim() || loading}
          onClick={async () => {
            setLoading(true);
            try { await onJoin(displayName.trim()); } catch(err) { console.error('[join]', err); }
            setLoading(false);
          }}>
          {loading ? 'Joining…' : 'Join Group'}
        </button>
        <button className="modal-cancel" onClick={() => window.history.replaceState({}, '', window.location.pathname)}>Cancel</button>
      </div>
    </div>
  );

  if (mode === 'entercode') return (
    <div className="modal-overlay">
      <div className="modal">
        <h2>Restore Picks</h2>
        <p style={{color:'#aaa',fontSize:'0.9rem',marginBottom:'16px'}}>
          Enter your group code or paste the invite link to restore your picks from a previous session.
        </p>
        <input className="modal-input" placeholder="Group code or invite link…"
          value={displayName}
          onChange={e => setDisplayName(e.target.value)}
          onKeyDown={async e => {
            if (e.key === 'Enter' && displayName.trim() && !loading) {
              setLoading(true); try { await onCreate(displayName.trim()); } finally { setLoading(false); }
            }
          }}
          autoFocus
        />
        <button className="modal-btn" disabled={!displayName.trim() || loading}
          onClick={async () => { setLoading(true); try { await onCreate(displayName.trim()); } finally { setLoading(false); } }}>
          {loading ? 'Looking up…' : 'Continue'}
        </button>
        <button className="modal-cancel" onClick={onClose}>Cancel</button>
      </div>
    </div>
  );

  return null;
}

/* ─────────────────────────────────────────────
   HOME PAGE
───────────────────────────────────────────── */
function HomePage({ picks, winners, onSelect, onClearAll, onExport, currentGroup, groupMember, onCreateGroup, onLeaveGroup, onRestorePicks, isLocked, now }) {
  const total = CATEGORIES.length;
  const done  = Object.keys(picks).length;
  const remaining = total - done;
  const [confirmClear, setConfirmClear] = React.useState(false);
  const confirmTimer = React.useRef(null);

  const handleClear = () => {
    if (!confirmClear) {
      setConfirmClear(true);
      confirmTimer.current = setTimeout(() => setConfirmClear(false), 3000);
    } else {
      clearTimeout(confirmTimer.current);
      setConfirmClear(false);
      onClearAll();
    }
  };

  const getCardStatus = (catId) => {
    const pick = picks[catId];
    const winner = winners[catId];
    if (!pick) return 'unpicked';
    if (!winner) return 'picked';
    return pick.name === winner ? 'correct' : 'wrong';
  };

  return (
    <div className="home">
      <div className="badge"><TrophyIcon color="#D4A843"/> 98TH ACADEMY AWARDS</div>
      <h1>Oscar<br/>Predictions</h1>
      <p className="subtitle">Pick as many categories as you like and see how you stack up on Hollywood's biggest night.</p>

      {/* Group strip */}
      {!currentGroup ? (
        <div className="group-strip">
          <button className="create-group-btn" onClick={onCreateGroup}>
            <UsersIcon/> Create a Group
          </button>
          <button className="restore-picks-btn" onClick={onRestorePicks}>
            Already in a group? Restore my picks
          </button>
        </div>
      ) : (
        <div className="group-strip">
          <div className="group-strip-info">
            <span>In</span>
            <strong>{currentGroup.name}</strong>
            {groupMember && <span>as <strong>{groupMember.display_name}</strong></span>}
          </div>
          <button className="group-strip-btn" onClick={onLeaveGroup}>Log out</button>
        </div>
      )}

      <div className="progress-card">
        <ProgressRing value={done} total={total}/>
        <span className="remain muted">
          {done === 0 ? 'No picks yet' : done === total ? "🎉 All categories picked! You're a movie buff, aren't ya?" : `${done} of ${total} categories picked`}
        </span>
        {done > 0 && (
          <button className={`clear-btn${confirmClear ? ' confirm' : ''}`} onClick={handleClear}>
            {confirmClear ? 'Tap again to confirm' : 'Clear all selections'}
          </button>
        )}
        <button className="export-pdf-btn" onClick={onExport}>📄 Export Ballot as PDF</button>
      </div>

      {/* Lock countdown strip */}
      {isLocked ? (
        <div className="lock-strip locked">
          🔒 Picks are locked — Oscar night is here!{' '}
          <a href="https://www.oscars.org/how-to-watch/" target="_blank" rel="noopener noreferrer" className="watch-link">Watch the Oscars live!</a>
        </div>
      ) : (
        <div className="lock-strip">
          Selections are automatically locked-in in <strong>{formatCountdown(LOCK_TIME.getTime() - now)}</strong> — Sun Mar 15 at 6 pm CST.{' '}
          <a href="https://www.oscars.org/how-to-watch/" target="_blank" rel="noopener noreferrer" className="watch-link">Watch the Oscars live!</a>
        </div>
      )}

      <div className="categories-grid">
        {CATEGORIES.map(cat => {
          const pick = picks[cat.id];
          const winner = winners[cat.id];
          const status = getCardStatus(cat.id);
          const freshPhoto = pick ? cat.nominees.find(n => n.name === pick.name)?.photo : null;
          const thumbSrc = freshPhoto || cat.nominees[0]?.photo || '';
          return (
            <div key={cat.id}
              className={`cat-card${status==='correct'?' correct':status==='wrong'?' wrong':status==='picked'?' picked':''}`}
              onClick={() => onSelect(cat.id)}>
              <div className="cat-icon">
                <TrophyIcon color={pick ? '#D4A843' : '#555'}/>
                {thumbSrc && <img src={proxyImg(thumbSrc)} alt={cat.name} onError={e => { e.target.style.display='none'; }}/>}
              </div>
              <div className="cat-body">
                <div className="cat-title">{cat.name}</div>
                <div className="cat-sub">{cat.nominees.length} nominees</div>
                {pick && (
                  <>
                    <div className="cat-pick small" style={{marginTop:8,fontSize:'0.72rem',color:'#888',fontWeight:400}}>Your pick</div>
                    <div className="cat-pick">{pick.name}</div>
                    {pick.detail && <div className="cat-pick-detail">{pick.detail}</div>}
                  </>
                )}
                {winner && <div className="cat-winner">🏆 Winner: {winner}</div>}
              </div>
              <div className="cat-right">
                {status === 'correct' ? (
                  <div className="check-circle green"><CheckIcon color="#fff"/></div>
                ) : status === 'wrong' ? (
                  <div className="check-circle red"><XIcon/></div>
                ) : pick ? (
                  <div className="check-circle"><CheckIcon/></div>
                ) : winner ? (
                  <div className="dash-circle">–</div>
                ) : (
                  <div className="arrow-circle"><ArrowRight/></div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   CATEGORY PAGE
───────────────────────────────────────────── */
function CategoryPage({ categoryId, picks, winners, onPick, onBack, groupMembers, groupPicksMap, groupMember, isLocked }) {
  const cat     = CATEGORIES.find(c => c.id === categoryId);
  const current = picks[categoryId];
  const winner  = winners[categoryId];

  const initials = (name) => {
    const parts = name.replace(/['"]/g, '').split(' ');
    return parts.length >= 2
      ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase()
      : name.replace(/['"]/g, '').slice(0, 2).toUpperCase();
  };

  return (
    <div className="detail-page" onClick={e => { if (e.target === e.currentTarget) onBack(); }}>
      <button className="back-btn" onClick={onBack}><ArrowLeft/> Back to categories</button>

      <div className="detail-header">
        <div className="detail-icon"><TrophyIcon color="#D4A843"/></div>
        <div>
          <h2>{cat.name}</h2>
          <p>{winner ? `Winner announced` : 'Select your prediction for the winner'}</p>
        </div>
      </div>

      {winner && (
        <div className="winner-banner">
          🏆 Winner: <strong>{winner}</strong>
          {current?.name === winner ? ' — Great pick!' : current ? ' — Better luck next time!' : ''}
        </div>
      )}

      {isLocked && (
        <div className="lock-banner">
          🔒 Picks are locked — Oscar night is here!
        </div>
      )}

      <div className={`nominee-list${isLocked ? ' picks-locked' : ''}`}>
        {cat.nominees.map(n => {
          const sel      = current?.name === n.name;
          const isWinner = winner === n.name;
          const friendPickers = (groupMembers || []).filter(m =>
            m.id !== groupMember?.id &&
            groupPicksMap?.[m.id]?.[categoryId]?.name === n.name
          );
          return (
            <div key={n.name}
              className={`nominee-row${isWinner ? ' winner-row' : sel ? ' selected' : ''}${isLocked ? ' locked-row' : ''}`}
              onClick={() => onPick(categoryId, n)}>
              <div className="nominee-avatar">
                {n.photo
                  ? <img src={proxyImg(n.photo)} alt={n.name} className={n.photoType === 'poster' ? 'poster' : ''}
                      onError={e => { e.target.style.display='none'; e.target.parentNode.textContent = initials(n.name); }}/>
                  : initials(n.name)
                }
              </div>
              <div className="nominee-info">
                <div className="nominee-name">{n.name}</div>
                {n.detail && <div className="nominee-detail">{n.detail}</div>}
                {isWinner && <div className="winner-label">🏆 Winner</div>}
                {friendPickers.length > 0 && (
                  <div className="friend-picks">
                    {friendPickers.map(m => <span key={m.id} className="friend-tag">{m.display_name}</span>)}
                  </div>
                )}
              </div>
              <div className="radio">
                {(sel || isWinner) && <div className="radio-dot"/>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   LEADERBOARD PAGE
───────────────────────────────────────────── */
function LeaderboardPage({ members, groupPicksMap, winners, sessionId }) {
  const totalCats   = CATEGORIES.length;
  const winnersSet  = Object.keys(winners).length;

  const ranked = members.map(m => {
    const mPicks = groupPicksMap[m.id] || {};
    let score = 0;
    for (const catId in winners) {
      if (mPicks[catId]?.name === winners[catId]) score++;
    }
    const pickCount = Object.keys(mPicks).length;
    return { ...m, score, pickCount };
  }).sort((a, b) => b.score - a.score || b.pickCount - a.pickCount || a.display_name.localeCompare(b.display_name));

  const rankEmoji = i => ['🥇','🥈','🥉'][i] ?? `${i+1}`;

  return (
    <div className="leaderboard-page">
      <h2>Leaderboard</h2>
      <p className="page-sub">
        {winnersSet === 0
          ? 'Scores will be tabulated once Oscar winners are announced. The person with the most number of correct Oscar predictions wins.'
          : `${winnersSet} of ${totalCats} winners announced`}
      </p>

      {members.length === 0 ? (
        <div className="lb-no-winners">
          No members yet.<br/>Share the invite link to get friends to join!
        </div>
      ) : (
        ranked.map((m, i) => (
          <div key={m.session_id} className={`lb-row${m.session_id === sessionId ? ' me' : ''}`}>
            <div className="lb-rank">{rankEmoji(i)}</div>
            <div className="lb-name">
              {m.display_name}
              {m.session_id === sessionId && <span className="you-badge">you</span>}
            </div>
            <div className="lb-score">
              {winnersSet > 0 ? (
                <>
                  <div className="big">{m.score}<span className="of"> / {winnersSet}</span></div>
                  <div className="picks">{m.pickCount} / {totalCats} picks made</div>
                </>
              ) : (
                <div className="picks">{m.pickCount} / {totalCats} picks made</div>
              )}
            </div>
          </div>
        ))
      )}
    </div>
  );
}

/* ─────────────────────────────────────────────
   WINNER ENTRY PAGE
───────────────────────────────────────────── */
function WinnerEntryPage({ winners, onSave, onScrape, scraping }) {
  const [local, setLocal] = useState({ ...winners });

  useEffect(() => { setLocal({ ...winners }); }, [winners]);

  return (
    <div className="winners-page">
      <h2>Set Winners</h2>
      <p className="page-sub">Manually select winners or auto-fill from Wikipedia after the ceremony.</p>

      <button className="scrape-btn" onClick={onScrape} disabled={scraping}>
        {scraping ? '⏳ Fetching from Wikipedia…' : '🌐 Auto-fill from Wikipedia'}
      </button>

      {CATEGORIES.map(cat => (
        <div key={cat.id} className="winner-cat-card">
          <div className="winner-cat-name">{cat.name}</div>
          <select
            className={`winner-select${local[cat.id] ? ' is-set' : ''}`}
            value={local[cat.id] || ''}
            onChange={e => setLocal(prev => {
              const next = { ...prev };
              if (e.target.value) next[cat.id] = e.target.value;
              else delete next[cat.id];
              return next;
            })}>
            <option value="">— Not announced yet —</option>
            {cat.nominees.map(n => (
              <option key={n.name} value={n.name}>{n.name}{n.detail ? ` — ${n.detail}` : ''}</option>
            ))}
          </select>
        </div>
      ))}

      <button className="save-winners-btn" onClick={() => onSave(local)}>Save Winners</button>
    </div>
  );
}

/* ─────────────────────────────────────────────
   APP ROOT
───────────────────────────────────────────── */
function App() {
  const [picks, setPicks] = useState(() => {
    try { return JSON.parse(localStorage.getItem('goldticket_picks') || '{}'); }
    catch { return {}; }
  });
  const [activeCat, setActiveCat]         = useState(null);
  const [currentGroup, setCurrentGroup]   = useState(() => {
    try { return JSON.parse(localStorage.getItem('goldticket_group') || 'null'); }
    catch { return null; }
  });
  const [groupMember, setGroupMember]     = useState(() => {
    try { return JSON.parse(localStorage.getItem('goldticket_member') || 'null'); }
    catch { return null; }
  });
  const [groupTab, setGroupTab]           = useState('picks');
  const [groupMembers, setGroupMembers]   = useState([]);
  const [groupPicksMap, setGroupPicksMap] = useState({});
  const [winners, setWinners]             = useState({});
  const [modal, setModal]                 = useState(null);
  const [pendingGroup, setPendingGroup]   = useState(null);
  const [pendingGroupMembers, setPendingGroupMembers] = useState([]);
  const [toast, setToast]                 = useState('');
  const [scraping, setScraping]           = useState(false);
  const [createdGroupName, setCreatedGroupName] = useState('');
  const [inviteUrl, setInviteUrl]         = useState('');

  const [now, setNow] = useState(() => Date.now());
  useEffect(() => {
    const t = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(t);
  }, []);
  const isLocked = now >= LOCK_TIME.getTime();

  const sessionId          = useRef(getSessionId());
  const saveTimeout        = useRef(null);
  const groupSaveTimeout   = useRef(null);
  const currentGroupRef    = useRef(currentGroup);
  const picksRef           = useRef(picks);          // always-current picks for async callbacks
  const groupMemberRef     = useRef(groupMember);    // always-current groupMember for async callbacks
  const userModifiedPicks  = useRef(false);           // true once user actually makes a pick
  useEffect(() => { currentGroupRef.current = currentGroup; }, [currentGroup]);
  useEffect(() => { picksRef.current = picks; }, [picks]);
  useEffect(() => { groupMemberRef.current = groupMember; }, [groupMember]);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 2800); };

  // ── Check URL for ?group= invite code ──
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('group');
    if (!code) return;
    supabase.from('groups').select('*').eq('invite_code', code).maybeSingle()
      .then(({ data: grp }) => {
        if (!grp) { showToast('Group not found.'); return; }
        supabase.from('group_members').select('*')
          .eq('group_id', grp.id).eq('session_id', sessionId.current).maybeSingle()
          .then(({ data: mem }) => {
            if (mem) {
              setCurrentGroup(grp);
              setGroupMember(mem);
              localStorage.setItem('goldticket_group', JSON.stringify(grp));
              localStorage.setItem('goldticket_member', JSON.stringify(mem));
              // Always refresh picks from group_picks to get latest across all devices
              fetchGroupPicks(grp.id, mem.id).then(gp => {
                if (gp) {
                  setPicks(gp);
                  localStorage.setItem('goldticket_picks', JSON.stringify(gp));
                }
              });
            } else {
              setPendingGroup(grp);
              supabase.from('group_members').select('display_name').eq('group_id', grp.id).order('joined_at')
                .then(({ data: mems }) => setPendingGroupMembers(mems?.map(m => m.display_name) || []));
              setModal('join');
            }
          });
      });
  }, []);

  // ── Load picks from Supabase on mount ──
  // If already in a group, prefer group_picks (canonical source across devices).
  // Guard: if the user already made picks while this async call was in-flight,
  // don't overwrite them — their new picks will be saved by the sync effect.
  useEffect(() => {
    const applyIfUnmodified = (newPicks) => {
      if (userModifiedPicks.current) return; // user already acted — don't clobber
      if (!newPicks || Object.keys(newPicks).length === 0) return;
      setPicks(newPicks);
      localStorage.setItem('goldticket_picks', JSON.stringify(newPicks));
    };

    const loadFromGlobal = () =>
      fetchGlobalPicks(sessionId.current).then(p => applyIfUnmodified(p));

    if (currentGroup && groupMember) {
      fetchGroupPicks(currentGroup.id, groupMember.id).then(gp => {
        if (gp) {
          applyIfUnmodified(gp);
        } else {
          loadFromGlobal();
        }
      });
    } else {
      loadFromGlobal();
    }
  }, []);

  // ── Keep group_members.session_id in sync with current session ──
  // Picks are now keyed by stable member_id so no pick migration needed.
  // Just keep session_id current so the leaderboard "you" badge highlights correctly.
  useEffect(() => {
    if (!currentGroup || !groupMember) return;
    supabase.from('group_members')
      .update({ session_id: sessionId.current })
      .eq('id', groupMember.id)
      .neq('session_id', sessionId.current) // no-op if already current
      .then(() => {});
  }, [currentGroup?.id]);

  // ── Load winners + group data on mount / group change ──
  useEffect(() => {
    supabase.from('winners').select('*').then(({ data }) => {
      const w = {};
      (data || []).forEach(r => { w[r.category_id] = r.winner_name; });
      setWinners(w);
    });
    if (currentGroup) loadGroupData(currentGroup);
  }, [currentGroup?.id]);

  // ── Immediate save when user hides the tab / closes the app ──
  // Uses picksRef so the callback always reads the latest picks without stale closure.
  useEffect(() => {
    const handleHide = () => {
      const latest = picksRef.current;
      if (currentGroupRef.current && groupMemberRef.current)
        saveGroupPicks(currentGroupRef.current.id, groupMemberRef.current.id, latest);
      saveGlobalPicks(sessionId.current, latest);
    };
    document.addEventListener('visibilitychange', handleHide);
    window.addEventListener('blur', handleHide);
    return () => {
      document.removeEventListener('visibilitychange', handleHide);
      window.removeEventListener('blur', handleHide);
    };
  }, []);

  // ── Sync picks to Supabase ──
  useEffect(() => {
    localStorage.setItem('goldticket_picks', JSON.stringify(picks));

    // Save to group_picks quickly so returning users always get latest
    clearTimeout(groupSaveTimeout.current);
    groupSaveTimeout.current = setTimeout(() => {
      if (currentGroupRef.current && groupMemberRef.current)
        saveGroupPicks(currentGroupRef.current.id, groupMemberRef.current.id, picks);
    }, 200);

    // Save to global picks table (longer debounce, less critical)
    clearTimeout(saveTimeout.current);
    saveTimeout.current = setTimeout(() => {
      saveGlobalPicks(sessionId.current, picks);
    }, 600);
  }, [picks]);

  // ── Load group leaderboard data ──
  const loadGroupData = async (group = currentGroup) => {
    if (!group) return;
    const [{ data: mems }, { data: allPicks }] = await Promise.all([
      supabase.from('group_members').select('*').eq('group_id', group.id).order('joined_at'),
      supabase.from('group_picks').select('*').eq('group_id', group.id),
    ]);
    setGroupMembers(mems || []);
    const map = {};
    (allPicks || []).forEach(p => { map[p.member_id] = p.picks; });
    setGroupPicksMap(map);
    // Also reload winners
    const { data: wData } = await supabase.from('winners').select('*');
    const w = {};
    (wData || []).forEach(r => { w[r.category_id] = r.winner_name; });
    setWinners(w);
  };

  // ── Handlers ──
  const handlePick = (catId, nominee) => {
    if (isLocked) { showToast('Picks are locked 🔒'); return; }
    userModifiedPicks.current = true;
    setPicks(prev => {
      if (prev[catId]?.name === nominee.name) {
        const { [catId]: _, ...rest } = prev;
        return rest;
      }
      return { ...prev, [catId]: nominee };
    });
  };

  const handleCreateGroup = async (groupName, displayName) => {
    const { data: grp, error } = await supabase
      .from('groups').insert({ name: groupName, created_by: '' }).select().single();
    if (error || !grp) { showToast('Error creating group.'); return; }

    const { data: mem } = await supabase.from('group_members')
      .insert({ group_id: grp.id, session_id: sessionId.current, display_name: displayName })
      .select().single();

    // Store creator's member ID so admin is tied to the member record, not session
    await supabase.from('groups').update({ created_by: mem.id }).eq('id', grp.id);
    const updatedGrp = { ...grp, created_by: mem.id };

    await saveGroupPicks(grp.id, mem.id, picks);

    setCurrentGroup(updatedGrp);
    setGroupMember(mem);
    localStorage.setItem('goldticket_group', JSON.stringify(updatedGrp));
    localStorage.setItem('goldticket_member', JSON.stringify(mem));

    const base = window.location.origin + window.location.pathname;
    const url = `${base}?group=${grp.invite_code}`;
    setInviteUrl(url);
    setCreatedGroupName(groupName);
    setModal('created');
  };

  const handleJoinGroup = async (displayName) => {
    if (!pendingGroup) return;

    // Check by session_id first (catches returning users even if they changed display name,
    // and avoids a unique-constraint crash on re-join attempts).
    const { data: bySession } = await supabase.from('group_members')
      .select('*').eq('group_id', pendingGroup.id).eq('session_id', sessionId.current).maybeSingle();

    // Also check by display_name in case a different device used the same name
    const { data: byName } = !bySession
      ? await supabase.from('group_members').select('*')
          .eq('group_id', pendingGroup.id).eq('display_name', displayName).maybeSingle()
      : { data: null };

    const existing = bySession || byName;

    let mem;
    if (existing) {
      // Returning user — picks are keyed by stable member_id, works across all devices
      const restoredPicks = await fetchGroupPicks(pendingGroup.id, existing.id)
        || await fetchGlobalPicks(existing.session_id);

      // Update session_id and/or display_name if either changed
      const needsUpdate = existing.session_id !== sessionId.current || existing.display_name !== displayName;
      if (needsUpdate) {
        const updates = { session_id: sessionId.current, display_name: displayName };
        const { data: updatedMem } = await supabase.from('group_members')
          .update(updates)
          .eq('id', existing.id)
          .select().single();
        mem = updatedMem || { ...existing, ...updates };
      } else {
        mem = existing;
      }

      // Write the resolved picks under the stable member_id
      await saveGroupPicks(pendingGroup.id, existing.id, restoredPicks || picks);

      if (restoredPicks) {
        setPicks(restoredPicks);
        localStorage.setItem('goldticket_picks', JSON.stringify(restoredPicks));
        showToast(`Welcome back, ${displayName}! Your picks have been restored.`);
      } else {
        showToast(`Welcome back, ${displayName}!`);
      }
    } else {
      // New member
      const { data: newMem, error: insertErr } = await supabase.from('group_members')
        .insert({ group_id: pendingGroup.id, session_id: sessionId.current, display_name: displayName })
        .select().single();
      if (!newMem) {
        console.error('[join insert]', insertErr);
        showToast('Error joining group — please try again.');
        return;
      }
      mem = newMem;
      await saveGroupPicks(pendingGroup.id, newMem.id, picks);
      showToast(`Welcome to ${pendingGroup.name}!`);
    }

    setCurrentGroup(pendingGroup);
    setGroupMember(mem);
    localStorage.setItem('goldticket_group', JSON.stringify(pendingGroup));
    localStorage.setItem('goldticket_member', JSON.stringify(mem));
    localStorage.removeItem('goldticket_last_code');
    setPendingGroup(null);
    setModal(null);
  };

  const handleLeaveGroup = () => {
    // Save invite code before clearing so user can easily re-join
    if (currentGroup?.invite_code) {
      localStorage.setItem('goldticket_last_code', currentGroup.invite_code);
    }
    setCurrentGroup(null);
    setGroupMember(null);
    setGroupTab('picks');
    setGroupMembers([]);
    setGroupPicksMap({});
    localStorage.removeItem('goldticket_group');
    localStorage.removeItem('goldticket_member');
    window.history.replaceState({}, '', window.location.pathname);
  };

  // Called from the 'entercode' modal — look up the group then flip to the 'join' modal
  const handleEnterCode = async (raw) => {
    // Accept either a bare code or the full invite URL
    const match = raw.match(/[?&]group=([^&\s]+)/);
    const code = (match ? match[1] : raw).trim();

    try {
      const { data: grp, error: grpErr } = await supabase.from('groups').select('*').eq('invite_code', code).maybeSingle();
      if (grpErr) throw grpErr;
      if (!grp) { showToast('Group not found. Check the code and try again.'); return; }

      const { data: mems } = await supabase.from('group_members')
        .select('display_name').eq('group_id', grp.id).order('joined_at');
      setPendingGroup(grp);
      setPendingGroupMembers(mems?.map(m => m.display_name) || []);
      setModal('join');
    } catch (err) {
      console.error('[entercode]', err);
      showToast('Something went wrong. Please try again.');
    }
  };

  const handleExportPDF = () => {
    if (typeof window.jspdf === 'undefined') {
      showToast('PDF library not loaded — please refresh and try again.');
      return;
    }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'pt', format: 'letter' });

    // Page dimensions & layout
    const PW = 612, PH = 792;
    const ML = 34, MR = 34, MT = 34, MB = 28;
    const COL_GAP = 12;
    const COL_W = (PW - ML - MR - COL_GAP) / 2;

    // Color palette matching app
    const C_BG     = [17,  17,  17 ];
    const C_GOLD   = [212, 168, 67 ];
    const C_TEXT   = [220, 220, 220];
    const C_MUTED  = [128, 128, 128];
    const C_CARD   = [30,  28,  24 ];
    const C_BORDER = [58,  48,  32 ];
    const C_CBORDER= [75,  65,  40 ];

    // Type scale
    const T_TITLE  = 8.5;
    const T_NOM    = 7.5;
    const T_DETAIL = 6.0;
    const LINE_H   = 12;
    const DETAIL_H = 7;
    const CARD_PAD = 7;
    const CHECK    = 7;
    const CARD_GAP = 7;
    const HDR_H    = 52;

    const BODY_TOP = MT + HDR_H + 8;
    const BODY_BOT = PH - MB - 14; // leave room for footer

    // Card height: pad + title-row + rule-gap + nominees + pad
    const cardH = (cat) => {
      const hasD = cat.nominees.some(n => n.detail);
      const rowH = hasD ? LINE_H + DETAIL_H : LINE_H;
      return CARD_PAD + T_TITLE + 3 + 3 + cat.nominees.length * rowH + CARD_PAD;
    };

    const fillBg = () => {
      doc.setFillColor(...C_BG);
      doc.rect(0, 0, PW, PH, 'F');
    };

    const drawHeader = () => {
      // Top gold rule
      doc.setFillColor(...C_GOLD);
      doc.rect(ML, MT, PW - ML - MR, 2, 'F');
      // App name
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(17);
      doc.setTextColor(...C_GOLD);
      doc.text('CULTURE BRACKETS', ML, MT + 18);
      // Subtitle
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(...C_MUTED);
      doc.text('2026 Academy Awards Ballot', ML, MT + 30);
      // Date right-aligned
      const d = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      doc.text(d, PW - MR, MT + 30, { align: 'right' });
      // Divider
      doc.setFillColor(58, 48, 32);
      doc.rect(ML, MT + 38, PW - ML - MR, 0.75, 'F');
    };

    const drawCard = (cat, x, y) => {
      const h = cardH(cat);
      const hasD = cat.nominees.some(n => n.detail);
      const rowH = hasD ? LINE_H + DETAIL_H : LINE_H;

      // Card background + border
      doc.setFillColor(...C_CARD);
      doc.roundedRect(x, y, COL_W, h, 3, 3, 'F');
      doc.setDrawColor(...C_BORDER);
      doc.setLineWidth(0.4);
      doc.roundedRect(x, y, COL_W, h, 3, 3, 'S');

      // Category title
      const titleY = y + CARD_PAD + T_TITLE;
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(T_TITLE);
      doc.setTextColor(...C_GOLD);
      doc.text(cat.name.toUpperCase(), x + CARD_PAD, titleY, { maxWidth: COL_W - 2 * CARD_PAD });

      // Rule under title
      doc.setFillColor(72, 58, 28);
      doc.rect(x + CARD_PAD, titleY + 2.5, COL_W - 2 * CARD_PAD, 0.5, 'F');

      // Nominees
      const nomStartY = titleY + 6;
      cat.nominees.forEach((nom, i) => {
        const ry    = nomStartY + i * rowH;
        const isPicked = picks[cat.id]?.name === nom.name;
        const cx    = x + CARD_PAD;
        const cy    = ry + (hasD ? 1 : 0);

        // Checkbox
        if (isPicked) {
          doc.setFillColor(...C_GOLD);
          doc.roundedRect(cx, cy, CHECK, CHECK, 1.2, 1.2, 'F');
          // Checkmark (two line segments)
          doc.setDrawColor(...C_BG);
          doc.setLineWidth(1.15);
          const bx = cx + 1.3, by = cy + CHECK * 0.56;
          doc.line(bx, by, bx + CHECK * 0.30, by + CHECK * 0.33);
          doc.line(bx + CHECK * 0.30, by + CHECK * 0.33, bx + CHECK * 0.78, by - CHECK * 0.30);
        } else {
          doc.setFillColor(38, 34, 22);
          doc.setDrawColor(...C_CBORDER);
          doc.setLineWidth(0.55);
          doc.roundedRect(cx, cy, CHECK, CHECK, 1.2, 1.2, 'FD');
        }

        // Nominee name
        const nx   = cx + CHECK + 3;
        const nameY = cy + CHECK * 0.78;
        const maxW  = COL_W - CARD_PAD - CHECK - 3 - CARD_PAD;
        doc.setFont('helvetica', isPicked ? 'bold' : 'normal');
        doc.setFontSize(T_NOM);
        doc.setTextColor(...(isPicked ? C_GOLD : C_TEXT));
        doc.text(nom.name, nx, nameY, { maxWidth: maxW });

        // Detail (sub-line)
        if (hasD && nom.detail) {
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(T_DETAIL);
          doc.setTextColor(...C_MUTED);
          doc.text(nom.detail, nx, nameY + DETAIL_H - 1, { maxWidth: maxW });
        }
      });
    };

    // --- Render ---
    fillBg();
    drawHeader();

    let col  = 0;
    let colY = [BODY_TOP, BODY_TOP];

    CATEGORIES.forEach(cat => {
      const h = cardH(cat);
      // Overflow check: try next column, then new page
      if (colY[col] + h > BODY_BOT) {
        if (col === 0) {
          col = 1;
        } else {
          doc.addPage();
          fillBg();
          drawHeader();
          col  = 0;
          colY = [BODY_TOP, BODY_TOP];
        }
      }
      const x = col === 0 ? ML : ML + COL_W + COL_GAP;
      drawCard(cat, x, colY[col]);
      colY[col] += h + CARD_GAP;
    });

    // Footer on every page
    const totalPages = doc.getNumberOfPages();
    for (let p = 1; p <= totalPages; p++) {
      doc.setPage(p);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(6.5);
      doc.setTextColor(...C_MUTED);
      doc.text(`culturebrackets  ·  Page ${p} of ${totalPages}`, PW / 2, PH - 10, { align: 'center' });
    }

    doc.save('culture-brackets-ballot.pdf');
    showToast('📄 Ballot exported!');
  };

  const handleCopyInvite = async () => {
    if (!currentGroup) return;
    const base = window.location.origin + window.location.pathname;
    const url = `${base}?group=${currentGroup.invite_code}`;
    try {
      await navigator.clipboard.writeText(url);
      showToast('🔗 Invite link copied!');
    } catch { showToast('Could not copy link.'); }
  };

  const handleSaveWinners = async (localWinners) => {
    const catIds = CATEGORIES.map(c => c.id);
    const upserts = catIds
      .filter(id => localWinners[id])
      .map(id => ({ category_id: id, winner_name: localWinners[id], set_at: new Date().toISOString() }));

    await supabase.from('winners').delete().in('category_id', catIds);
    if (upserts.length > 0) await supabase.from('winners').insert(upserts);

    const w = {};
    upserts.forEach(r => { w[r.category_id] = r.winner_name; });
    setWinners(w);
    showToast(`✓ ${upserts.length} winner${upserts.length !== 1 ? 's' : ''} saved`);
  };

  const handleScrape = async () => {
    setScraping(true);
    try {
      const scraped = await scrapeWikipediaWinners();
      const count = Object.keys(scraped).length;
      if (count === 0) {
        showToast('No winners found on Wikipedia yet.');
      } else {
        setWinners(prev => ({ ...prev, ...scraped }));
        showToast(`Found ${count} winner${count !== 1 ? 's' : ''} from Wikipedia`);
      }
    } catch {
      showToast('Could not fetch Wikipedia. Try again later.');
    }
    setScraping(false);
  };

  const handleTabChange = (tab) => {
    setGroupTab(tab);
    setActiveCat(null);
    if (tab !== 'picks') loadGroupData();
  };

  // Admin = whoever joined first; cascades to next member if they leave
  const isAdmin = groupMember && groupMembers.length > 0 && groupMembers[0].id === groupMember.id;

  // ── Render ──
  let content;
  if (currentGroup && groupTab === 'leaderboard') {
    content = <LeaderboardPage members={groupMembers} groupPicksMap={groupPicksMap} winners={winners} sessionId={sessionId.current}/>;
  } else if (currentGroup && groupTab === 'winners' && isAdmin) {
    content = <WinnerEntryPage winners={winners} onSave={handleSaveWinners} onScrape={handleScrape} scraping={scraping}/>;
  } else if (activeCat) {
    content = <CategoryPage categoryId={activeCat} picks={picks} winners={winners} onPick={handlePick} onBack={() => setActiveCat(null)}
      groupMembers={groupMembers} groupPicksMap={groupPicksMap} groupMember={groupMember} isLocked={isLocked}/>;
  } else {
    content = <HomePage picks={picks} winners={winners} onSelect={setActiveCat}
      onClearAll={() => setPicks({})} onExport={handleExportPDF}
      currentGroup={currentGroup} groupMember={groupMember}
      onCreateGroup={() => setModal('create')} onLeaveGroup={handleLeaveGroup}
      onRestorePicks={() => setModal('entercode')}
      isLocked={isLocked} now={now}/>;
  }

  return (
    <>
      {currentGroup && (
        <GroupNav group={currentGroup} tab={groupTab} isAdmin={isAdmin}
          onTabChange={handleTabChange} onInvite={handleCopyInvite}/>
      )}
      {content}
      {modal && (
        <GroupModal key={modal} mode={modal}
          groupName={modal === 'join' ? pendingGroup?.name : createdGroupName}
          inviteUrl={inviteUrl}
          existingMembers={pendingGroupMembers}
          onClose={() => setModal(null)}
          onCreate={modal === 'entercode' ? handleEnterCode : handleCreateGroup}
          onJoin={handleJoinGroup}
          defaultCode={modal === 'entercode' ? (localStorage.getItem('goldticket_last_code') || '') : ''}/>
      )}
      <Toast msg={toast}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
